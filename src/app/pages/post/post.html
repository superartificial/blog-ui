<main class="page-post">
  <div class="container container--narrow">

    @if (loading()) {
      <div class="loading">
        <span class="spinner"></span>
      </div>
    } @else if (notFound()) {
      <div class="not-found">
        <h1>Post not found</h1>
        <a routerLink="/">← Back to writing</a>
      </div>
    } @else if (post()) {
      <a class="back-link" routerLink="/">← Writing</a>

      <article>
        <header class="post-header">
          <div class="post-meta">
            <time class="post-date">{{ formatDate(post()!.createdAt) }}</time>
            <!-- Tag (implement when tags are available):
            <span class="post-tag">{{ post()!.tag }}</span>
            -->
          </div>
          <h1 class="post-title">{{ post()!.title }}</h1>
        </header>
        <div class="post-content" [innerHTML]="renderedContent()"></div>
      </article>

      <footer class="post-footer">
        <a routerLink="/">← Back to writing</a>
      </footer>
    }

  </div>
</main>

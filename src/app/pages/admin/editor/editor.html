<main class="container page-editor">
  <header class="editor-header">
    <h1>{{ isEditing() ? 'Edit post' : 'New post' }}</h1>
    <a routerLink="/admin" class="btn-cancel">Cancel</a>
  </header>

  @if (error()) {
    <p class="error-msg">{{ error() }}</p>
  }

  <form class="editor-form" (ngSubmit)="save()">
    <div class="field">
      <label for="title">Title</label>
      <input
        id="title"
        type="text"
        [(ngModel)]="post.title"
        name="title"
        (input)="onTitleChange()"
        placeholder="Post title"
      />
    </div>

    <div class="field">
      <label for="slug">Slug</label>
      <input
        id="slug"
        type="text"
        [(ngModel)]="post.slug"
        name="slug"
        placeholder="post-slug"
      />
    </div>

    <div class="field">
      <label for="excerpt">Excerpt <span class="optional">(optional)</span></label>
      <input
        id="excerpt"
        type="text"
        [(ngModel)]="post.excerpt"
        name="excerpt"
        placeholder="Short description shown in post list"
      />
    </div>

    <div class="field field-content">
      <label>Author's note <span class="optional">(optional — shown before the article)</span></label>
      <textarea #humanIntroArea></textarea>
    </div>

    <div class="field field-content">
      <label>Content</label>
      <textarea #contentArea></textarea>
    </div>

    <div class="field field-content">
      <label>How this was made <span class="optional">(optional — shown after the article)</span></label>
      <textarea #aiNotesArea></textarea>
    </div>

    <div class="field">
      <label for="status">Status</label>
      <select id="status" [(ngModel)]="post.status" name="status">
        <option value="DRAFT">Draft</option>
        <option value="AWAITING_REVIEW">Awaiting review</option>
        <option value="PUBLISHED">Published</option>
        <option value="ARCHIVED">Archived</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          Saving…
        } @else if (isEditing()) {
          Save changes
        } @else {
          Create post
        }
      </button>
    </div>
  </form>
</main>

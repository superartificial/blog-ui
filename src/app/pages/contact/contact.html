<main class="container container--narrow page-contact">
  <h1>Get in touch</h1>
  <p class="intro">Have a question or just want to say hello? Drop me a message.</p>

  @if (success()) {
    <div class="success-msg">
      <p>Thanks for reaching out — I'll get back to you soon.</p>
    </div>
  } @else {
    @if (error()) {
      <p class="error-msg">{{ error() }}</p>
    }

    <form (ngSubmit)="submit()">
      <!-- Honeypot: hidden from real users, attracts bots -->
      <div class="hp-field" aria-hidden="true">
        <label for="website">Website</label>
        <input id="website" type="text" [(ngModel)]="website" name="website" tabindex="-1" autocomplete="off" />
      </div>

      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" [(ngModel)]="name" name="name" autocomplete="name" autofocus />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" autocomplete="email" />
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" [(ngModel)]="message" name="message" rows="7"></textarea>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          Sending…
        } @else {
          Send message
        }
      </button>
    </form>
  }
</main>

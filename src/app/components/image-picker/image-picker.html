<div class="image-picker">
  @if (url) {
    <div class="image-preview">
      <img [src]="url" [alt]="label" />
      <button class="btn-remove" type="button" (click)="clear()" title="Remove image">✕</button>
    </div>
  }

  <label class="btn-upload" [class.uploading]="uploading()">
    {{ uploading() ? 'Uploading…' : url ? 'Replace' : 'Upload image' }}
    <input
      type="file"
      accept="image/jpeg,image/png,image/gif,image/webp"
      (change)="onFileSelected($event)"
      [disabled]="uploading()"
    />
  </label>

  @if (error()) {
    <p class="upload-error">{{ error() }}</p>
  }
</div>

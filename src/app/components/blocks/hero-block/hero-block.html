<section class="hero-block" [style.backgroundImage]="bgImageUrl ? 'url(' + bgImageUrl + ')' : null">
  <div class="hero-block-inner">
    @if (title) { <h1 class="hero-title">{{ title }}</h1> }
    @if (subtitle) { <p class="hero-subtitle">{{ subtitle }}</p> }
    @if (ctaText && ctaUrl) {
      <a class="hero-cta btn-primary" [routerLink]="ctaUrl">{{ ctaText }}</a>
    }
  </div>
</section>

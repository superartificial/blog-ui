<div class="blog-feed-block">
  @if (heading) { <h2 class="feed-heading">{{ heading }}</h2> }

  @if (loading()) {
    <div class="feed-loading"><span class="spinner"></span></div>
  } @else if (posts().length === 0) {
    <p class="feed-empty">No posts yet.</p>
  } @else {
    <ul class="feed-list">
      @for (post of posts(); track post.id) {
        <li><app-post-card [post]="post" /></li>
      }
    </ul>
  }
</div>

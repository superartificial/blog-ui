<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" routerLink="/">clem.nz</a>
    <div class="nav-links">
      <a routerLink="/pages/about" routerLinkActive="active">About</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </div>
  </div>
</nav>

@if (authService.isLoggedIn()) {
  <div class="admin-bar">
    <div class="admin-bar-inner">
      <span class="admin-bar-label">Admin</span>
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Posts</a>
      <a routerLink="/admin/pages" routerLinkActive="active">Pages</a>
      <a routerLink="/admin/contacts" routerLinkActive="active">Contacts</a>
      <a routerLink="/admin/images" routerLinkActive="active">Images</a>
      <button class="btn-admin-logout" (click)="authService.logout()">Logout</button>
    </div>
  </div>
}
